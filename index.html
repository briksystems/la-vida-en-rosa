document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

rmal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"96b69b89-8089-47d5-9d60-b4bc5e470ab3\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  /* ===== RESET & BASE ===== */\n  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }\n  :root {\n    --rosa:      #ffdedb;\n    --rosa-deep: #ddc1c0;\n    --viola:     #5e53a2;\n    --viola-pale:#e8e6f5;\n    --copper:    #b87a50;\n    --dark:      #2a2a2a;\n    --mid:       #6b6b6b;\n    --light:     #f9f4f3;\n    --white:     #ffffff;\n    --serif: 'Cormorant Garamond', Georgia, serif;\n    --display: 'Playfair Display', Georgia, serif;\n    --sans: 'Raleway', sans-serif;\n  }\n  html { scroll-behavior: smooth; }\n  body {\n    font-family: var(--sans);\n    background: var(--white);\n    color: var(--dark);\n    overflow-x: hidden;\n    cursor: none;\n  }\n\n  /* ===== CURSOR ===== */\n  .cursor-dot {\n    width: 8px; height: 8px;\n    background: var(--viola);\n    border-radius: 50%;\n    position: fixed; top: 0; left: 0;\n    pointer-events: none; z-index: 9999;\n    transform: translate(-50%, -50%);\n    transition: transform 0.1s;\n  }\n  .cursor-ring {\n    width: 36px; height: 36px;\n    border: 1.5px solid var(--rosa-deep);\n    border-radius: 50%;\n    position: fixed; top: 0; left: 0;\n    pointer-events: none; z-index: 9998;\n    transform: translate(-50%, -50%);\n    transition: transform 0.15s ease, width 0.2s, height 0.2s;\n  }\n  .cursor-ring.hovered { width: 56px; height: 56px; border-color: var(--viola); }\n\n  /* ===== NAV ===== */\n  nav {\n    position: fixed; top: 0; left: 0; right: 0; z-index: 100;\n    display: flex; align-items: center; justify-content: space-between;\n    padding: 20px 48px;\n    transition: background 0.4s, box-shadow 0.4s;\n  }\n  nav.scrolled {\n    background: cing: 0.2em;\n    text-transform: uppercase;\n    color: var(--viola);\n  }\n\n  /* ===== INICIATIVA ===== */\n  .iniciativa {\n    background: var(--viola);\n    padding: 80px;\n    display: grid;\n    grid-template-columns: 1fr 2fr;\n    gap: 60px;\n    align-items: center;\n  }\n  .iniciativa-badge {\n    display: flex; flex-direction: column;\n    align-items: center; justify-content: center;\n    background: rgba(255,255,255,0.1);\n    padding: 48px 36px;\n    text-align: center;\n    border: 1px solid rgba(255,255,255,0.2);\n  }\n  .badge-plus {\n    font-family: var(--display);\n    font-size: 72px;\n    font-weight: 700;\n    color: var(--rosa);\n    line-height: 1;\n  }\n  .badge-word {\n    font-family: var(--sans);\n    font-weight: 300;\n    font-size: 28px;\n    letter-spacing: 0.3em;\n    text-transform: uppercase;\n    color: var(--white);\n  }\n  .iniciativa-title {\n    font-family: var(--display);\n    font-size: 42px;\n    color: var(--white);\n    margin-bottom: 16px;\n  }\n  .iniciativa-title em { font-style: italic; color: var(--rosa); }\n  .iniciativa-body {\n    font-family: var(--sans);\n    font-weight: 300;\n    font-size: 15px;\n    line-height: 1.9;\n    color: rgba(255,255,255,0.7);\n    margin-bottom: 24px;\n  }\n\n  /* ===== CONTACTO ===== */\n  #contacto {\n    background: var(--dark);\n    padding: 100px 80px;\n    display: grid;\n    grid-template-columns: 1fr 1fr;\n    gap: 80px;\n  }\n  .contacto-left .section-label { color: var(--rosa-deep); }\n  .contacto-left .section-label::before { background: var(--rosa-deep); }\n  .contacto-left .section-title { color: var(--white); }\n  .contacto-info {\n    margin-top: 40px;\n    display: flex; flex-direction: column; gap: 24px;\n  }\n  .info-row {\n    display: flex; gap: 16px; align-items: flex-start;\n  }\n  .info-icon {\n    width: 40px; height: 40px;\n    background: rgba(255,255,255,0.05);\n    display: flex; align-items: center; justify-content: center;\n    flex-shrink: 0;\n    color: var(--rosa);\n    font-size: 16px;\n  }\n  .info-label {\n    font-family: var(--sans);\n    font-weight: 300;\n    font-size: 10px;\n    letter-spacing: 0.22em;\n    text-transform: uppercase;\n    color: #666;\n    margin-bottom: 4px;\n  }\n  .info-value {\n    font-family: var(--sans);\n    font-weight: 400;\n    font-size: 14px;\n    color: var(--white);\n    text-decoration: none;\n    transition: color 0.2s;\n  }\n  .info-value:hover { color: var(--rosa); }\n  .contacto-form {\n    display: flex; flex-direction: column; gap: 0;\n  }\n  .form-row {\n    display: grid; grid-template-columns: 1fr 1fr; gap: 2px; margin-bottom: 2px;\n  }\n  .form-field {\n    position: relative;\n  }\n  .form-field input,\n  .form-field textarea,\n  .form-field select {\n    width: 100%;\n    font-family: var(--sans);\n    font-weight: 300;\n    font-size: 13px;\n    color: var(--white);\n    background: rgba(255,255,255,0.04);\n    border: none;\n    border-bottom: 1px solid rgba(255,255,255,0.1);\n    padding: 20px 16px 12px;\n    outline: none;\n    transition: border-color 0.3s, background 0.3s;\n    appearance: none;\n    resize: none;\n  }\n  .form-field select option { background: var(--dark); }\n  .form-field textarea { height: 120px; }\n  .form-field label {\n    position: absolute;\n    top: 10px; left: 16px;\n    font-family: var(--sans);\n    font-weight: 300;\n    font-size: 10px;\n    letter-spacing: 0.18em;\n    text-transform: uppercase;\n    color: #555;\n    pointer-events: none;\n    transition: color 0.3s;\n  }\n  .form-field input:focus,\n  .form-field textarea:focus,\n  .form-field select:focus {\n    background: rgba(255,255,255,0.06);\n    border-bottom-color: var(--rosa-deep);\n  }\n  .form-field input:focus + label,\n  .form-field textarea:focus + label { color: var(--rosa-deep); }\n  .form-submit {\n    margin-top: 2px;\n    font-family: var(--sans);\n    font-weight: 400;\n    font-size: 11px;\n    letter-spacing: 0.2em;\n    text-transform: uppercase;\n    color: var(--dark);\n    background: var(--rosa);\n    border: none;\n    padding: 18px 40px;\n    cursor: pointer;\n    transition: all 0.3s;\n    width: 100%;\n  }\n  .form-submit:hover { background: var(--white); }\n\n  /* ===== FOOTER ===== */\n  footer {\n    background: #111;\n    padding: 60px 80px 40px;\n  }\n  .footer-top {\n    display: grid;\n    grid-template-columns: 2fr 1fr 1fr;\n    gap: 60px;\n    padding-bottom: 40px;\n    border-bottom: 1px solid rgba(255,255,255,0.06);\n    margin-bottom: 32px;\n  }\n  .footer-brand .nav-wordmark { color: rgba(255,255,255,0.7); }\n  .footer-tagline {\n    font-family: var(--serif);\n    font-style: italic;\n    font-size: 15px;\n    color: #555;\n    line-height: 1.7;\n    margin-top: 16px;\n    max-width: 300px;\n  }\n  .footer-social {\n    display: flex; gap: 12px; margin-top: 24px;\n  }\n  .social-link {\n    width: 36px; height: 36px;\n    border: 1px solid rgba(255,255,255,0.1);\n    display: flex; align-items: center; justify-content: center;\n    color: rgba(255,255,255,0.4);\n    font-size: 14px;\n    text-decoration: none;\n    transition: all 0.2s;\n  }\n  .social-link:hover {\n    border-color: var(--rosa-deep);\n    color: var(--rosa);\n  }\n  .footer-col h4 {\n    font-family: var(--sans);\n    font-weight: 400;\n    font-size: 10px;\n    letter-spacing: 0.26em;\n    text-transform: uppercase;\n    color: rgba(255,255,255,0.3);\n    margin-bottom: 20px;\n  }\n  .footer-col ul { list-style: none; display: flex; flex-direction: column; gap: 10px; }\n  .footer-col ul a {\n    font-family: var(--sans);\n    font-weight: 300;\n    font-size: 13px;\n    color: rgba(255,255,255,0.45);\n    text-decoration: none;\n    transition: color 0.2s;\n  }\n  .footer-col ul a:hover { color: var(--rosa); }\n  .footer-bottom {\n    display: flex; justify-content: space-between; align-items: center;\n  }\n  .footer-copy {\n    font-family: var(--sans);\n    font-weight: 300;\n    font-size: 11px;\n    color: rgba(255,255,255,0.2);\n    letter-spacing: 0.08em;\n  }\n  .footer-copy a { color: var(--rosa-deep); text-decoration: none; }\n  .footer-brik {\n    font-family: var(--sans);\n    font-weight: 300;\n    font-size: 11px;\n    color: rgba(255,255,255,0.15);\n    letter-spacing: 0.1em;\n  }\n\n  /* ===== WHATSAPP FLOAT ===== */\n  .wa-float {\n    position: fixed;\n    bottom: 32px; right: 32px;\n    z-index: 200;\n    background: #25D366;\n    color: var(--white);\n    width: 52px; height: 52px;\n    border-radius: 50%;\n    display: flex; align-items: center; justify-content: center;\n    text-decoration: none;\n    font-size: 24px;\n    box-shadow: 0 4px 20px rgba(37,211,102,0.4);\n    transition: transform 0.3s, box-shadow 0.3s;\n  }\n  .wa-float:hover {\n    transform: scale(1.1);\n    box-shadow: 0 8px 32px rgba(37,211,102,0.5);\n  }\n  .wa-tooltip {\n    position: absolute;\n    right: 60px;\n    background: var(--dark);\n    color: var(--white);\n    font-family: var(--sans);\n    font-weight: 300;\n    font-size: 12px;\n    padding: 6px 12px;\n    white-space: nowrap;\n    opacity: 0;\n    transition: opacity 0.3s;\n    pointer-events: none;\n  }\n  .wa-float:hover .wa-tooltip { opacity: 1; }\n\n  /* ===== ANIMATIONS ===== */\n  @keyframes fadeUp {\n    from { opacity: 0; transform: translateY(30px); }\n    to   { opacity: 1; transform: translateY(0); }\n  }\n  @keyframes fadeIn {\n    from { opacity: 0; }\n    to   { opacity: 1; }\n  }\n  @keyframes marquee {\n    from { transform: translateX(0); }\n    to   { transform: translateX(-50%); }\n  }\n\n  .reveal {\n    opacity: 0;\n    transform: translateY(40px);\n    transition: opacity 0.8s ease, transform 0.8s ease;\n  }\n  .reveal.visible {\n    opacity: 1;\n    transform: translateY(0);\n  }\n\n  /* ===== SCROLL PROGRESS ===== */\n  .scroll-progress {\n    position: fixed; top: 0; left: 0;\n    width: 0%; height: 2px;\n    background: linear-gradient(90deg, var(--rosa-deep), var(--viola));\n    z-index: 9999 ósito<\u002Fa><\u002Fli>\n    <li><a href=\"#proyectos\">Proyectos<\u002Fa><\u002Fli>\n    <li><a href=\"#shop\">Shop<\u002Fa><\u002Fli>\n    <li><a href=\"#clientes\">Clientes<\u002Fa><\u002Fli>\n    <li><a href=\"#presentacion\">Presentación<\u002Fa><\u002Fli>\n  <\u002Ful>\n  <a href=\"#contacto\" class=\"nav-cta\">Contacto<\u002Fa>\n<\u002Fnav>\n\n<!-- ===== HERO ===== -->\n<section id=\"inicio\">\n  <div class=\"hero-left\">\n    <p class=\"hero-eyebrow\">Flores de Papel · Bogotá, Colombia<\u002Fp>\n    <h1 class=\"hero-title\">La Vida<br><em>en Rosa<\u002Fem><\u002Fh1>\n    <p class=\"hero-subtitle\">Pliegues que florecen en nuestras manos<\u002Fp>\n    <p class=\"hero-tagline\">Creamos flores de papel únicas para bodas, marcas, eventos y espacios. Piezas hechas con amor, materiales de alta calidad y un inmenso detalle artesanal.<\u002Fp>\n    <div class=\"hero-buttons\">\n      <a href=\"#proyectos\" class=\"btn-primary\">Ver Proyectos<\u002Fa>\n      <a href=\"#shop\" class=\"btn-outline\">Tienda Online<\u002Fa>\n    <\u002Fdiv>\n    <!-- Decorative geo -->\n    <svg class=\"hero-geo\" viewBox=\"0 0 200 200\" fill=\"none\">\n      <path d=\"M20 20 L100 100 L20 180 Z\" stroke=\"#5e53a2\" stroke-width=\"1\"><\u002Fpath>\n      <path d=\"M100 20 L100 180\" stroke=\"#5e53a2\" stroke-width=\"1\"><\u002Fpath>\n      <circle cx=\"140\" cy=\"100\" r=\"80\" stroke=\"#5e53a2\" stroke-width=\"1\"><\u002Fcircle>\n    <\u002Fsvg>\n  <\u002Fdiv>\n  <div class=\"hero-right\">\n    <div class=\"hero-mosaic\">\n      <div class=\"mosaic-cell\">\n        <div class=\"fill fill-1\"><\u002Fdiv>\n        <div class=\"mosaic-label\">Peonias · Papel Crepé<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"mosaic-cell\">\n        <div class=\"fill fill-2\"><\u002Fdiv>\n        <div class=\"mosaic-label\">Hortensias<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"mosaic-cell\">\n        <div class=\"fill fill-3\"><\u002Fdiv>\n        <div class=\"mosaic-label\">Ranúnculus<\u002Fdiv 02Fh2>\n    <p class=\"section-body\">\n      Hace más de seis años comenzamos este hermoso proyecto con una gran visión: impactar la vida de muchas mujeres. Hoy, La Vida en Rosa es sinónimo de flores de papel únicas, memorables y llenas de vida — desde vitrinas de marcas de lujo hasta bouquets de novia que duran para siempre.\n    <\u002Fp>\n    <p class=\"section-body\" style=\"margin-top:16px;\">\n      Trabajamos con papel, tela, madera, alambre, cintas y acuarelas para crear piezas especiales con un factor de naturalidad propia. Cada flor es un mundo en miniatura.\n    <\u002Fp>\n    <div class=\"about-stats\">\n      <div class=\"stat-item\">\n        <div class=\"stat-num\">6+<\u002Fdiv>\n        <div class=\"stat-label\">Años de experiencia<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"stat-item\">\n        <div class=\"stat-num\">50+<\u002Fdiv>\n        <div class=\"stat-label\">Marcas aliadas<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"stat-item\">\n        <div class=\"stat-num\">+Rosa<\u002Fdiv>\n        <div class=\"stat-label\">Iniciativa social activa<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"stat-item\">\n        <div class=\"stat-num\">∞<\u002Fdiv>\n        <div class=\"stat-label\">Posibilidades en papel<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===== PROPÓSITO ===== -->\n<section id=\"proposito\">\n  <div class=\"proposito-grid\">\n    <div class=\"proposito-left reveal\">\n      <p class=\"section-label\">Nuestros Principios<\u002Fp>\n      <h2 class=\"section-title\" style=\"color:var(--white)\">Lo que nos<br><em>hace diferentes<\u002Fem><\u002Fh2>\n      <blockquote class=\"proposito-quote\">\n        \"Pliegues y uniones emergentes que florecen en nuestras manos.\"\n      <\u002Fblockquote>\n      <p class=\"proposito-body\">\n        Nuestros productos son un espejo de la realidad sembrado desde las ideas más delicadas y sofisticadas. Son memorables, tratados con el mayor cuidado muchas más, participando en Colombia Moda 2019, publicaciones en Revista Alo Novias y apariciones en Canal RCN.\n        <\u002Fp>\n        <a href=\"https://wa.me/573208654762?text=Hola!%20Quiero%20recibir%20su%20carta%20de%20presentaci%C3%B3n%20completa\" target=\"_blank\" class=\"btn-primary\" style=\"display:inline-block;\">Solicitar Presentación Completa<\u002Fa>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:2px;\">\n        <div style=\"background:var(--white);border:1px solid var(--rosa-deep);padding:28px 32px;\">\n          <div style=\"font-family:var(--sans);font-weight:500;font-size:10px;letter-spacing:0.22em;text-transform:uppercase;color:var(--viola);margin-bottom:10px;\">Nuestro Diferencial<\u002Fdiv>\n          <p style=\"font-family:var(--sans);font-weight:300;font-size:13px;line-height:1.8;color:var(--mid);\">Piezas únicas que no se marchitan, personalizadas al 100% según la identidad y requerimientos de cada cliente o marca.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:var(--white);border:1px solid var(--rosa-deep);padding:28px 32px;\">\n          <div style=\"font-family:var(--sans);font-weight:500;font-size:10px;letter-spacing:0.22em;text-transform:uppercase;color:var(--viola);margin-bottom:10px;\">Materiales<\u002Fdiv>\n          <p style=\"font-family:var(--sans);font-weight:300;font-size:13px;line-height:1.8;color:var(--mid);\">Papel crepé italiano, papel seda, tela, madera, alambre floral, cintas de seda y acuarelas de alta calidad.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:var(--white);border:1px solid var(--rosa-deep);padding:28px 32px;\">\n          <div style=\"font-family:var(--sans);font-weight:500;font-size:10px;letter-spacing:0.22em;text-transform:uppercase;color:var(--viola);margin-bottom:10px;\">Impacto Social — +Rosa<\u002Fdiv>\n          <p style=\"font-family:var(--sans);font-weight:300;font-size:13px;line-height:1.8;color:var(--mid);\">Generamos empleo para m
